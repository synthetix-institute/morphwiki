<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MorphWiki operator-native physics workflow</title>
  <desc id="desc">A white-background diagram showing physics prose rewritten into typed constructors and compiled into a mechanism tree.</desc>
  <defs>
    <linearGradient id="blue" x1="288" y1="96" x2="288" y2="574" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="green" x1="866" y1="108" x2="866" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16A34A"/>
      <stop offset="1" stop-color="#84CC16"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#FFFFFF"/>
  <rect x="48" y="48" width="1104" height="579" rx="28" fill="#F8FAFC" stroke="#E2E8F0"/>

  <text x="96" y="114" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="800">
    MorphWiki
  </text>
  <text x="96" y="156" fill="#334155" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="25" font-weight="600">
    Knowledge without nouns
  </text>
  <text x="96" y="190" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">
    Rewrite physics concepts as typed mechanisms that AI agents can inspect, test, and extend.
  </text>

  <g filter="url(#shadow)">
    <rect x="92" y="244" width="310" height="270" rx="22" fill="#FFFFFF" stroke="#CBD5E1"/>
    <rect x="116" y="270" width="262" height="42" rx="11" fill="#EEF2FF" stroke="#C7D2FE"/>
    <rect x="116" y="330" width="218" height="28" rx="8" fill="#E2E8F0"/>
    <rect x="116" y="374" width="246" height="28" rx="8" fill="#E2E8F0"/>
    <rect x="116" y="418" width="188" height="28" rx="8" fill="#E2E8F0"/>
    <text x="116" y="242" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">
      HISTORICAL PROSE
    </text>
    <text x="134" y="298" fill="#3730A3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18" font-weight="700">
      electron
    </text>
    <text x="134" y="352" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">
      photon
    </text>
    <text x="134" y="396" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">
      measurement
    </text>
    <text x="134" y="440" fill="#334155" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="16">
      Hilbert space
    </text>
    <text x="116" y="478" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
      named topics, historical order,
    </text>
    <text x="116" y="500" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
      prose definitions
    </text>
  </g>

  <path d="M420 378 C470 378 493 378 540 378" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="438" y="352" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">
    rewrite
  </text>
  <text x="438" y="374" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">
    by operational role
  </text>

  <g filter="url(#shadow)">
    <rect x="548" y="214" width="260" height="328" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="572" y="242" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">
      CONSTRUCTOR
    </text>

    <g>
      <rect x="575" y="270" width="206" height="34" rx="17" fill="#DBEAFE" stroke="#93C5FD"/>
      <text x="598" y="292" fill="#1E3A8A" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">state / carrier</text>
    </g>
    <g>
      <rect x="575" y="316" width="206" height="34" rx="17" fill="#E0F2FE" stroke="#7DD3FC"/>
      <text x="598" y="338" fill="#075985" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">operator</text>
    </g>
    <g>
      <rect x="575" y="362" width="206" height="34" rx="17" fill="#ECFDF5" stroke="#86EFAC"/>
      <text x="598" y="384" fill="#166534" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">spectrum</text>
    </g>
    <g>
      <rect x="575" y="408" width="206" height="34" rx="17" fill="#FEFCE8" stroke="#FDE68A"/>
      <text x="598" y="430" fill="#854D0E" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">readout</text>
    </g>
    <g>
      <rect x="575" y="454" width="206" height="34" rx="17" fill="#FFF1F2" stroke="#FDA4AF"/>
      <text x="598" y="476" fill="#9F1239" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="700">compatibility</text>
    </g>
    <path d="M678 305 L678 316" stroke="#94A3B8" stroke-width="2"/>
    <path d="M678 351 L678 362" stroke="#94A3B8" stroke-width="2"/>
    <path d="M678 397 L678 408" stroke="#94A3B8" stroke-width="2"/>
    <path d="M678 443 L678 454" stroke="#94A3B8" stroke-width="2"/>
    <text x="574" y="520" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
      typed roles, equation witnesses,
    </text>
    <text x="574" y="542" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
      sparse-attention diagnostics
    </text>
  </g>

  <path d="M826 378 C874 378 896 378 944 378" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="844" y="352" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="800">
    compile
  </text>
  <text x="844" y="374" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14">
    into a tree
  </text>

  <g filter="url(#shadow)">
    <rect x="946" y="232" width="166" height="292" rx="24" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="972" y="260" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" letter-spacing="0.08em">
      TREE
    </text>
    <circle cx="1029" cy="305" r="17" fill="url(#green)"/>
    <circle cx="996" cy="365" r="13" fill="#BFDBFE" stroke="#2563EB"/>
    <circle cx="1062" cy="365" r="13" fill="#BBF7D0" stroke="#16A34A"/>
    <circle cx="982" cy="430" r="11" fill="#FEF3C7" stroke="#D97706"/>
    <circle cx="1030" cy="430" r="11" fill="#FCE7F3" stroke="#DB2777"/>
    <circle cx="1078" cy="430" r="11" fill="#E0E7FF" stroke="#4F46E5"/>
    <path d="M1029 322 L996 352" stroke="#94A3B8" stroke-width="2"/>
    <path d="M1029 322 L1062 352" stroke="#94A3B8" stroke-width="2"/>
    <path d="M996 378 L982 419" stroke="#94A3B8" stroke-width="2"/>
    <path d="M1062 378 L1030 419" stroke="#94A3B8" stroke-width="2"/>
    <path d="M1062 378 L1078 419" stroke="#94A3B8" stroke-width="2"/>
    <text x="980" y="485" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
      mechanism-first
    </text>
    <text x="988" y="507" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">
      quantum book
    </text>
  </g>

  <rect x="96" y="570" width="1008" height="1" fill="#CBD5E1"/>
  <text x="96" y="604" fill="#0F172A" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">
    Not semantic similarity. Operational structure.
  </text>
  <text x="424" y="604" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">
    A concept is placed by what it makes computable.
  </text>
</svg>
